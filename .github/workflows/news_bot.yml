name: CourtKing News Bot 🤖

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run News Bot
        run: python news_bot.py

      - name: Commit noticias.json
        run: |
          git config user.name "CourtKing Bot"
          git config user.email "bot@courtking.mx"
          git add noticias.json
          git diff --staged --quiet || git commit -m "🤖 Noticias actualizadas $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
