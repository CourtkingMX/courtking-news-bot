name: CourtKing News Bot
on:
  schedule:
    - cron: '0 0,8,16 * * *'   # 00:00, 08:00, 16:00 UTC (18:00, 02:00, 10:00 MX)
  workflow_dispatch:             # Run manually desde GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CourtKing Bot v8
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}    # ✅ AGREGADO
        run: python news_bot.py

      - name: Commit & push JSONs
        run: |
          git config user.name  "courtking-bot"
          git config user.email "bot@courtking.mx"
          git add noticias.json videos.json partidos.json tablas.json
          git diff --cached --quiet || git commit -m "bot: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
